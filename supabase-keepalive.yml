name: Supabase Keep-Alive

# Jalankan tiap 3 hari sekali (jam 00:00 UTC) agar Supabase free tier tidak di-pause
on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:  # bisa juga dijalankan manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Mengirim ping ke Supabase untuk mencegah pause..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/app_config?select=key&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "206" ]; then
            echo "✓ Supabase aktif dan merespons"
          else
            echo "⚠ Respons tidak terduga: $RESPONSE"
            exit 1
          fi
